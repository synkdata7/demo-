<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynkData | Panel de Consultas v1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h1 { color: #1a202c; margin-bottom: 0.5rem; font-size: 1.5rem; }
        p { color: #718096; margin-bottom: 1.5rem; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #3182ce; }
        button { width: 100%; padding: 12px; background: #3182ce; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2b6cb0; }
        .hidden { display: none; }
        #results-box { margin-top: 1.5rem; text-align: left; background: #edf2f7; padding: 1rem; border-radius: 8px; font-family: monospace; font-size: 0.85rem; color: #2d3748; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3182ce; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="login-section" class="card">
        <h1>SynkData Cloud</h1>
        <p>Ingresa tus credenciales para acceder al panel de semanas cotizadas.</p>
        <input type="text" id="user" placeholder="Usuario de cliente">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="handleLogin()">Iniciar Sesión</button>
        <div style="margin-top: 1rem; font-size: 0.7rem; color: #cbd5e0;">Acceso restringido por IP</div>
    </div>

    <div id="dashboard-section" class="card hidden">
        <h1>Panel de Consultas</h1>
        <p>Módulo de Semanas Cotizadas (NSS / CURP)</p>
        <input type="text" id="query-input" placeholder="Ej: 01128456789">
        <button id="btn-query" onclick="simulateQuery()">Consultar Datos</button>
        
        <div id="loading" class="hidden" style="margin-top: 1rem;">
            <div class="loader"></div> <span style="font-size: 0.9rem; color: #4a5568;">Conectando con API Nufi...</span>
        </div>

        <div id="results-box" class="hidden">
            <strong>JSON Response:</strong>
            <pre id="json-output"></pre>
        </div>
        
        <button onclick="location.reload()" style="background: transparent; color: #a0aec0; margin-top: 1rem; font-size: 0.8rem;">Cerrar Sesión</button>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            // Credenciales para que ellos prueben (puedes cambiarlas)
            if(user === "admin" && pass === "synk2026") {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
            } else {
                alert("Credenciales inválidas para este demo.");
            }
        }

        function simulateQuery() {
            const val = document.getElementById('query-input').value;
            if(!val) return alert("Por favor ingresa un NSS o CURP");

            const btn = document.getElementById('btn-query');
            const loader = document.getElementById('loading');
            const results = document.getElementById('results-box');
            const output = document.getElementById('json-output');

            btn.disabled = true;
            loader.classList.remove('hidden');
            results.classList.add('hidden');

            // Simulamos el delay de la API real de Nufi
            setTimeout(() => {
                btn.disabled = false;
                loader.classList.add('hidden');
                results.classList.remove('hidden');

                const fakeData = {
                    status: "success",
                    data: {
                        nss: val,
                        semanas_cotizadas: Math.floor(Math.random() * (1200 - 500 + 1)) + 500,
                        ultimo_patron: "EMPRESA DE LOGISTICA S.A. DE C.V.",
                        vigencia: "VIGENTE",
                        timestamp: new Date().toLocaleString()
                    },
                    source: "Nufi-Enrichment-API"
                };

                output.textContent = JSON.stringify(fakeData, null, 2);
            }, 2500);
        }
    </script>
</body>
</html>
