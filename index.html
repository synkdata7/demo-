<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SynkData | Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f1f5f9;
  --sidebar:#ffffff;
  --primary:#10b981;
  --text:#0f172a;
}

body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}

/* LOGIN */
#login-page{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0f172a,#1e293b);
}

.login-card{
  background:white;
  padding:2rem;
  border-radius:16px;
  width:320px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,.3);
}

.login-card input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

.btn-login{
  width:100%;
  padding:12px;
  margin-top:15px;
  background:var(--primary);
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* DASHBOARD */
#main-dashboard{display:none}

.sidebar{
  width:250px;
  background:white;
  height:100vh;
  padding:20px;
  border-right:1px solid #e2e8f0;
  position:fixed;
}

.main{
  margin-left:250px;
  padding:2rem;
}

.logo{font-weight:700;font-size:20px;margin-bottom:20px}
.logo span{color:var(--primary)}

.nav-item{
  padding:10px;
  border-radius:8px;
  margin-bottom:5px;
  color:#64748b;
  cursor:pointer;
}
.nav-item.active{background:#e2e8f0;color:black}
.nav-item:hover{background:#e2e8f0}

.user-box{
  position:absolute;
  bottom:20px;
  width:210px;
  background:#f8fafc;
  padding:10px;
  border-radius:10px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1rem;
  margin-bottom:1.5rem;
}

.card{
  background:white;
  padding:1rem;
  border-radius:14px;
  box-shadow:0 2px 6px rgba(0,0,0,.05);
}

.panel{
  background:white;
  padding:1.5rem;
  border-radius:16px;
  margin-bottom:1rem;
}

.hidden{display:none}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-card">
    <h2>SynkData</h2>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <button class="btn-login" onclick="login()">Ingresar</button>
    <p style="font-size:.7rem;margin-top:10px">admin / 1234</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="main-dashboard">

<div class="sidebar">
  <div class="logo">Gestor<span>RH</span></div>

  <div class="nav-item active" onclick="switchTab(event,'dashboard')">Dashboard</div>
  <div class="nav-item" onclick="switchTab(event,'queries')">Solicitudes</div>
  <div class="nav-item" onclick="switchTab(event,'users')">Asesores</div>

  <div class="user-box">
    <b id="username">admin</b><br>
    <small>Administrador</small>
    <button onclick="logout()" style="width:100%;margin-top:8px">Cerrar sesión</button>
  </div>
</div>

<div class="main">

<div id="tab-dashboard">
<h2>Dashboard</h2>

<div class="cards">
  <div class="card"><h4>ASESORES</h4><p>10</p></div>
  <div class="card"><h4>SOLICITUDES</h4><p>0</p></div>
  <div class="card"><h4>RECARGAS</h4><p>0</p></div>
  <div class="card"><h4>COMPLETADOS</h4><p>22</p></div>
</div>

<div class="panel">Solicitudes pendientes</div>
<div class="panel">Recargas pendientes</div>

</div>

<div id="tab-queries" class="hidden">
  <h2>Solicitudes</h2>
  <div class="panel">
    <p>Realizar consulta</p>
    <button onclick="makeQuery()" style="padding:10px 15px;border:none;background:#10b981;color:white;border-radius:8px;cursor:pointer">Consultar</button>
    <p id="query-msg" style="margin-top:10px;color:#ef4444;font-size:.9rem"></p>
  </div>
</div>

<div id="tab-users" class="hidden">
  <h2>Asesores</h2>

  <div class="panel">
    <h4>Crear nuevo usuario</h4>
    <input id="new-user" placeholder="Usuario" style="margin-top:10px;padding:8px;width:100%;border:1px solid #ddd;border-radius:6px">
    <input id="new-pass" placeholder="Contraseña" type="password" style="margin-top:10px;padding:8px;width:100%;border:1px solid #ddd;border-radius:6px">
    <input id="new-credits" placeholder="Créditos" type="number" style="margin-top:10px;padding:8px;width:100%;border:1px solid #ddd;border-radius:6px">
    <button onclick="addUser()" style="margin-top:10px;padding:10px;border:none;background:#10b981;color:white;border-radius:8px;width:100%">Crear usuario</button>
  </div>

  <div class="panel">
    <h4>Lista de usuarios</h4>
    <ul id="user-list" style="padding-left:15px"></ul>
  </div>
</div>

</div>
</div>

<script>

const USERS=[{user:'admin',pass:'1234',credits:0}];
let currentUser=null;

function login(){
  const u=document.getElementById('user').value.trim();
  const p=document.getElementById('pass').value.trim();

  const ok=USERS.find(x=>x.user===u && x.pass===p);

  if(ok){
    currentUser = ok;
    document.getElementById('login-page').style.display='none';
    document.getElementById('main-dashboard').style.display='block';
    document.getElementById('username').innerText=u;
  }else{
    alert('Credenciales incorrectas');
  }
}

function logout(){location.reload()}

function switchTab(e,name){
  document.querySelectorAll('[id^="tab-"]').forEach(t=>t.classList.add('hidden'));
  document.getElementById('tab-'+name).classList.remove('hidden');

  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  e.currentTarget.classList.add('active');
}

// CONSULTA DEMO
function makeQuery(){
  if(!currentUser || currentUser.credits <= 0){
    document.getElementById('query-msg').innerText = 'No se le han asignado saldos.';
    return;
  }

  currentUser.credits--;
  document.getElementById('query-msg').style.color = '#10b981';
  document.getElementById('query-msg').innerText = 'Consulta realizada correctamente';
}

// CREAR USUARIOS
function addUser(){
  const u = document.getElementById('new-user').value.trim();
  const p = document.getElementById('new-pass').value.trim();
  const c = parseInt(document.getElementById('new-credits').value) || 0;

  if(!u || !p){
    alert('Completa usuario y contraseña');
    return;
  }

  USERS.push({user:u, pass:p, credits:c});
  renderUsers();

  document.getElementById('new-user').value='';
  document.getElementById('new-pass').value='';
  document.getElementById('new-credits').value='';
}

function renderUsers(){
  const list = document.getElementById('user-list');
  list.innerHTML='';

  USERS.forEach(u=>{
    const li = document.createElement('li');
    li.textContent = `${u.user} | créditos: ${u.credits}`;
    list.appendChild(li);
  });
}

// inicializar lista
setTimeout(renderUsers, 100);

</script>

</body>
</html>
