<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SynkData | Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f1f5f9;
  --sidebar:#ffffff;
  --primary:#10b981;
  --text:#0f172a;
}

body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}
.hidden{display:none}

/* LOGIN */
#login-page{
  height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0f172a,#1e293b);
}
.login-card{
  background:white;padding:2rem;border-radius:16px;width:320px;text-align:center;
}
.login-card input{
  width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ddd;
}
.btn-login{
  width:100%;padding:12px;margin-top:15px;background:var(--primary);color:white;border:none;border-radius:8px;
}

/* LAYOUT */
#main-dashboard{display:flex}

.sidebar{
  width:250px;background:var(--sidebar);height:100vh;padding:20px;border-right:1px solid #e2e8f0;
}

.logo{font-weight:700;font-size:20px;margin-bottom:20px}
.logo span{color:var(--primary)}

.nav-item{
  padding:10px;border-radius:8px;margin-bottom:5px;color:#64748b;cursor:pointer;
}
.nav-item.active{background:#e2e8f0;color:black}
.nav-item:hover{background:#e2e8f0}

.user-box{
  position:absolute;bottom:20px;width:210px;background:#f8fafc;padding:10px;border-radius:10px;
}

.main{
  flex:1;padding:2rem;
}

.cards{
  display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;
}
.card{
  background:white;padding:1rem;border-radius:14px;box-shadow:0 2px 6px rgba(0,0,0,.05);
}
.card h4{margin:0;font-size:.8rem;color:#64748b}
.card p{margin:5px 0 0;font-size:1.5rem;font-weight:600}

.panel{
  background:white;padding:1.5rem;border-radius:16px;margin-bottom:1rem;
}
.center{
  text-align:center;color:#94a3b8;margin-top:30px
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-card">
    <h2>SynkData</h2>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <button class="btn-login" onclick="login()">Ingresar</button>
    <p style="font-size:.7rem;margin-top:10px">admin / 1234</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="main-dashboard" class="hidden">

<div class="sidebar">
  <div class="logo">Gestor<span>RH</span></div>

  <div class="nav-item active" onclick="switchTab(event,'dashboard')">Dashboard</div>
  <div class="nav-item" onclick="switchTab(event,'queries')">Solicitudes</div>
  <div class="nav-item" onclick="switchTab(event,'users')">Asesores</div>

  <div class="user-box">
    <b id="username">admin</b><br>
    <small>Administrador</small>
    <button onclick="logout()" style="width:100%;margin-top:8px">Cerrar sesión</button>
  </div>
</div>

<div class="main">

<div id="tab-dashboard">
<h2>Dashboard</h2>

<div class="cards">
  <div class="card"><h4>ASESORES</h4><p>10</p></div>
  <div class="card"><h4>SOLICITUDES</h4><p>0</p></div>
  <div class="card"><h4>RECARGAS</h4><p>0</p></div>
  <div class="card"><h4>COMPLETADOS</h4><p>22</p></div>
</div>

<div class="panel">
  <h4>Solicitudes pendientes</h4>
  <div class="center">Sin solicitudes</div>
</div>

<div class="panel">
  <h4>Recargas pendientes</h4>
  <div class="center">Sin recargas</div>
</div>

</div>

<div id="tab-queries" class="hidden">
  <h2>Solicitudes</h2>
  <div class="panel">Módulo de consultas</div>
</div>

<div id="tab-users" class="hidden">
  <h2>Asesores</h2>
  <div class="panel">Lista de usuarios</div>
</div>

</div>
</div>

<script>

const USERS=[{user:'admin',pass:'1234'}];

function login(){
  const u=user.value;
  const p=pass.value;

  const ok=USERS.find(x=>x.user===u && x.pass===p);

  if(ok){
    login-page.classList.add('hidden');
    main-dashboard.classList.remove('hidden');
    username.innerText=u;
  }else alert('Error');
}

function logout(){location.reload()}

function switchTab(e,name){
  document.querySelectorAll('[id^="tab-"]').forEach(t=>t.classList.add('hidden'));
  document.getElementById('tab-'+name).classList.remove('hidden');

  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  e.currentTarget.classList.add('active');
}

</script>

</body>
</html>
